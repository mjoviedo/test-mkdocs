site_name: IA en Educación Superior
site_url: https://sitename.example
repo_url: https://github.com/mjoviedo/test-mkdocs
repo_name: mjoviedo/test-mkdocs
edit_uri: edit/main/docs/
theme:
  name: material
  icon:
    logo: fontawesome/solid/door-open
    edit: material/pencil 
    view: material/eye
  features:
    - navigation.footer
    - content.action.edit
    - content.action.view
  palette:
    # Dark Mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Dark mode
      primary: blue
      accent: deep orange

    # Light Mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Light mode
      primary: blue
      accent: deep orange
    

markdown_extensions:
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
       custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details

plugins:
  - git-committers:
      repository: squidfunk/mkdocs-material
      branch: main
      enabled: !ENV [CI, false]

extra:
  social:
    - icon: simple/youtube
      link: https://youtube.com/@james-willett
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/willettjames

copyright: FyPE - Facultad de Ciencias Económicas - Universidad Nacional de Córdoba